<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AegisCore Dashboard • Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gradient-text {
            background: linear-gradient(90deg, #22d3ee, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-focus {
            transition: all 0.3s ease;
        }

        .input-focus:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.15);
            transform: translateY(-2px);
        }

        .cyber-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, #22d3ee, transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(800%);
            }
        }
    </style>
</head>

<body class="bg-[#0a0f1c] min-h-screen flex items-center justify-center overflow-hidden relative">

    <!-- Background Effects -->
    <div class="absolute inset-0 bg-[radial-gradient(at_center,#22d3ee10_0%,transparent_70%)]"></div>

    <!-- Subtle grid background -->
    <div
        class="absolute inset-0 bg-[linear-gradient(to_right,#1e293720_1px,transparent_1px),linear-gradient(to_bottom,#1e293720_1px,transparent_1px)] bg-[size:40px_40px]">
    </div>

    <div class="relative z-10 w-full max-w-md px-6">
        <div class="glass border border-slate-700/50 rounded-3xl p-10">

            <!-- Logo & Header -->
            <div class="flex flex-col items-center mb-10">
                <div
                    class="w-16 h-16 bg-gradient-to-br from-cyan-500 to-violet-600 rounded-2xl flex items-center justify-center mb-4 shadow-xl shadow-cyan-500/30">
                    <i class="fa-solid fa-shield-halved text-4xl text-black"></i>
                </div>
                <h1 class="text-4xl font-bold tracking-tighter gradient-text"> AegisCore Dashboard</h1>
                <p class="text-cyan-400 text-sm tracking-widest mt-1">SECURITY OPERATIONS</p>
            </div>

            <h2 class="text-2xl font-semibold text-center text-white mb-8">Welcome back, Analyst</h2>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Username or Email</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <input type="text" id="username" placeholder="admin" value="admin" required
                            class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl py-4 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="password" placeholder="••••••••" value="password123" required
                            class="input-focus w-full bg-slate-900 border border-slate-700 rounded-2xl py-4 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none">
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-cyan-400">
                            <i id="eye-icon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me + Forgot -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 accent-cyan-500">
                        <span class="text-slate-400">Remember me</span>
                    </label>
                    <a href="#" class="text-cyan-400 hover:text-cyan-300 transition-colors">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" id="loginBtn"
                    class="w-full bg-gradient-to-r from-cyan-500 to-violet-600 hover:from-cyan-400 hover:to-violet-500 text-black font-semibold py-4 rounded-2xl text-lg transition-all active:scale-95 shadow-lg shadow-cyan-500/30">
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="my-8 flex items-center gap-4">
                <div class="flex-1 h-px bg-slate-700"></div>
                <span class="text-slate-500 text-sm">OR</span>
                <div class="flex-1 h-px bg-slate-700"></div>
            </div>

            <!-- SSO Buttons -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="ssoLogin('Azure')"
                    class="flex items-center justify-center gap-3 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-2xl py-3 transition-all">
                    <i class="fa-brands fa-microsoft text-xl"></i>
                    <span class="text-sm font-medium">Azure AD</span>
                </button>
                <button onclick="ssoLogin('Okta')"
                    class="flex items-center justify-center gap-3 bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-2xl py-3 transition-all">
                    <i class="fa-solid fa-key text-xl"></i>
                    <span class="text-sm font-medium">Okta</span>
                </button>
            </div>

            <!-- Footer -->
            <div class="text-center mt-10 text-xs text-slate-500">
                <p>Access restricted to authorized SOC personnel only</p>
                <p class="mt-2">Pune • SOC v0.2</p>
            </div>
        </div>
    </div>

    <!-- Animated scanning lines -->
    <div class="cyber-line w-full top-0 left-0 opacity-20"></div>
    <div class="cyber-line w-full top-0 left-0 opacity-10" style="animation-delay: 1.2s"></div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const originalBg = btn.style.background;

            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Authenticating...`;
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                if (res.ok) {
                    btn.innerHTML = `✓ Access Granted`;
                    btn.style.background = 'linear-gradient(90deg, #10b981, #34d399)';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 800);
                } else {
                    btn.innerHTML = `Sign In`;
                    btn.disabled = false;
                    btn.style.background = originalBg;
                    alert("ACCESS DENIED. VERIFY CREDENTIALS.");
                }
            } catch (err) {
                btn.innerHTML = `Sign In`;
                btn.disabled = false;
                alert('NETWORK ERROR. UNABLE TO REACH AUTH SERVER.');
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = "password";
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function ssoLogin(provider) {
            alert(`🔐 Redirecting to ${provider} SSO...\n\n(This is a demo)`);
        }

        // Bonus: Press Enter to login
        document.addEventListener('keypress', function (e) {
            if (e.key === "Enter") {
                const form = document.getElementById('loginForm');
                if (form) form.dispatchEvent(new Event('submit'));
            }
        });
    </script>

</body>

</html>
